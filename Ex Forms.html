<!--Basic of HTML5 Forms-->
<!DOCTYPE html>
<html>
    <head>
        <title>HTML5 Form Example</title>
    </head>
    <body>
        <h2>Student Registration Form</h2>
        <!--Form Element-->
        <form>
            <label>Student Name:</label><br>
            <!--Form Input Field-->
            <input type="text" name="Enter Name" required><br><br>
            <!--email input field-->
            <label>Email:</label><br>
            <input type="email" Placeholder="Enter Email"><br><br> 
            <!--Password input field-->
            <label>Password:</label><br>
            <input type="password"><br><br>
            <!--Date input field-->
            <label>Birth Date:</label><br>
            <input type="date"><br><br>
            <!--Number input field-->
            <label>Age:</label><br>
            <input type="number" ><br><br>
            <!--Color input field-->
            <label>Favorite Color:</label><br>
            <input type="color"><br><br>
            <!--URL input field-->
            <label>Website:</label><br>
            <input type="url" ><br><br>
            <!--Select and Option fields-->
            <label>Course:</label><br>
            <select>
                <option>Computer Diploma</option>
                <option>IT Diploma</option>
                <option>Software Diploma</option>
            </select><br><br>
            <!--Radio buttons-->
            <label>Gender:</label><br>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female<br><br>
            <!--Checkboxes-->
            <label>Hobbies:</label><br>
            <input type="checkbox">Cricket        
            <input type="checkbox">Music<br><br>
            <!--Range input field-->
            <label>Satisfaction Level:</label><br>
            <input type="range" ><br><br>
            <!--Submit button-->
            <input type="submit" value="Register">
        </form>
    </body>
</html>
